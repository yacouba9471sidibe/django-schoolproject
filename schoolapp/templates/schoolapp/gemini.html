{% extends 'schoolapp/base.html' %}

{% block title %}Google Gemini AI{% endblock %}

{% block content %}
<h1>Google Gemini AI</h1>
<form method="post">
    {% csrf_token %}
    <textarea name="question" rows="4" cols="50" placeholder="Votre question..."></textarea><br>
    <button type="submit">Envoyer</button>
</form>
{% if result %}
    <h3>Réponse :</h3>
    <p>{{ result }}</p>
{% endif %}
{% endblock %}
